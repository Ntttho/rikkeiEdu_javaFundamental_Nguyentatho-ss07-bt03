<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
  <meta charset="UTF-8">
  <title>Danh sách món ăn</title>
</head>
<body layout:fragment="content">
<h2>Danh sách món ăn</h2>
<p th:if="${#lists.isEmpty(dishes)}">Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau</p>

<table border="1" cellpadding="10" th:unless="${#lists.isEmpty(dishes)}">
  <tr>
    <th>ID</th>
    <th>Tên món</th>
    <th>Giá</th>
    <th>Trạng thái</th>
  </tr>

  <tr th:each="dish : ${dishes}">
    <td th:text="${dish.id}"></td>
    <td th:text="${dish.name}"></td>
    <td th:text="${dish.price} + ' VNĐ'"></td>

    <td>
                    <span th:if="${dish.available}" style="color: green">
                        Còn hàng
                    </span>

      <span th:unless="${dish.available}" style="color:red">
                        Hết hàng
                    </span>
    </td>

    <td>
      <a th:href="@{|/bai3/edit/${dish.id}|}">
        Chỉnh sửa
      </a>
    </td>
  </tr>
</table>
</body>
</html>
